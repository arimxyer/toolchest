<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WAAPI minimal example</title>
  <style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #111; }
    .box { width: 80px; height: 80px; background: #6366f1; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="box" id="box"></div>
  <script>
    const box = document.getElementById('box');

    // Runs on click: bounce the box using Element.animate()
    box.addEventListener('click', () => {
      box.animate(
        [
          { transform: 'scale(1)',   offset: 0   },
          { transform: 'scale(1.4)', offset: 0.4 },
          { transform: 'scale(1)',   offset: 1   },
        ],
        { duration: 500, easing: 'ease-in-out', fill: 'none' }
      );
    });

    // Auto-play: fade in on load using the Animation controller
    const effect = new KeyframeEffect(
      box,
      [{ opacity: 0, transform: 'translateY(20px)' }, { opacity: 1, transform: 'translateY(0)' }],
      { duration: 600, easing: 'ease-out', fill: 'backwards' }
    );
    new Animation(effect, document.timeline).play();
  </script>
</body>
</html>
