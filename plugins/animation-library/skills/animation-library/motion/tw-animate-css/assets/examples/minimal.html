<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tw-animate-css minimal example</title>
  <!-- Tailwind v4 + tw-animate-css via CDN (development only) -->
  <script src="https://cdn.tailwindcss.com?v=4"></script>
  <style>
    @import "https://unpkg.com/tw-animate-css@1.4.0/dist/tw-animate.css";
  </style>
</head>
<body class="min-h-screen bg-slate-950 flex flex-col items-center justify-center gap-6 p-8">

  <!-- Enter: fade + slide from top -->
  <div class="animate-in fade-in slide-in-from-top-8 duration-500 ease-out
              bg-white rounded-xl px-8 py-4 text-slate-900 font-semibold shadow-lg">
    Slides in from top (animate-in + fade-in + slide-in-from-top-8)
  </div>

  <!-- Enter: zoom + fade, delayed -->
  <div class="animate-in zoom-in-95 fade-in duration-300 delay-200
              bg-indigo-600 text-white rounded-xl px-8 py-4 font-semibold shadow-lg">
    Zooms in from 95% after 200 ms delay
  </div>

  <!-- Blur in -->
  <div class="animate-in blur-in duration-700
              bg-emerald-500 text-white rounded-xl px-8 py-4 font-semibold shadow-lg">
    Blurs into focus (blur-in)
  </div>

  <!-- Paused — toggled by JS for demo -->
  <button
    onclick="this.classList.toggle('paused')"
    class="animate-in spin-in fade-in duration-1000 repeat-[infinite]
           bg-rose-500 text-white rounded-xl px-8 py-4 font-semibold shadow-lg">
    Click to pause spin (spin-in + repeat-[infinite])
  </button>

</body>
</html>
