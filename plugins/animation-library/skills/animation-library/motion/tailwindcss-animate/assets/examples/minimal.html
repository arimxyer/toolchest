<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tailwindcss-animate minimal example</title>
  <!-- CDN Tailwind v3 with tailwindcss-animate via CDN shim not available;
       this example uses inline keyframes matching what the plugin generates. -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Keyframes that tailwindcss-animate generates at build time */
    @keyframes enter {
      from { opacity: var(--tw-enter-opacity,1); transform: translate3d(var(--tw-enter-translate-x,0),var(--tw-enter-translate-y,0),0) scale3d(var(--tw-enter-scale,1),var(--tw-enter-scale,1),var(--tw-enter-scale,1)) rotate(var(--tw-enter-rotate,0)); }
    }
    .animate-in  { animation-name: enter; animation-duration: 150ms; }
    .fade-in-0   { --tw-enter-opacity: 0; }
    .zoom-in-95  { --tw-enter-scale: .95; }
    .slide-in-from-top-2 { --tw-enter-translate-y: -0.5rem; }
    .duration-300 { animation-duration: 300ms; }
    .ease-out { animation-timing-function: cubic-bezier(0,0,.2,1); }
  </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <!-- Card: fades in + scales up from 95% + slides down from 2 units above -->
  <div class="animate-in fade-in-0 zoom-in-95 slide-in-from-top-2 duration-300 ease-out
              bg-white rounded-xl shadow-lg p-8 max-w-sm w-full">
    <h1 class="text-xl font-semibold text-gray-900 mb-2">tailwindcss-animate</h1>
    <p class="text-gray-500 text-sm">
      Three effects composed via class names: fade-in, zoom-in-95, slide-in-from-top.
      Zero JavaScript. CSS-only at runtime.
    </p>
  </div>

</body>
</html>
